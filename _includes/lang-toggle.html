<style>
.lang-toggle {
  display: inline-flex;
  border: 1px solid #ccc;
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 1.5em;
}
.lang-toggle button {
  padding: 6px 16px;
  border: none;
  background: #f5f5f5;
  cursor: pointer;
  font-size: 14px;
  color: #555;
  transition: background 0.2s, color 0.2s;
}
.lang-toggle button.active {
  background: #333;
  color: #fff;
}
.lang-toggle button:not(:last-child) {
  border-right: 1px solid #ccc;
}
.lang-en { display: none; }
</style>

<div class="lang-toggle">
  <button id="btn-ja" class="active" onclick="switchLang('ja')">日本語</button>
  <button id="btn-en" onclick="switchLang('en')">English</button>
</div>

<script>
function switchLang(lang) {
  document.querySelectorAll('.lang-ja, .lang-en').forEach(function(el) {
    el.style.display = 'none';
  });
  document.querySelectorAll('.lang-' + lang).forEach(function(el) {
    el.style.display = 'block';
  });
  document.getElementById('btn-ja').className = lang === 'ja' ? 'active' : '';
  document.getElementById('btn-en').className = lang === 'en' ? 'active' : '';
}
</script>
